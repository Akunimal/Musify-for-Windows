name: Build & Release (Windows)

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable bundle
        shell: pwsh
        run: |
          $zip = "Musify-for-Windows-$env:GITHUB_REF_NAME.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zip
          echo "ZIP=$zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: musify-windows
          path: Musify-for-Windows-*.zip

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: Musify-for-Windows-*.zip
          generate_release_notes: false
          make_latest: true
