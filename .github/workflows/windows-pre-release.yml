name: Build & Pre-Release (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable bundle
        shell: pwsh
        run: |
          $zip = "Musify-for-Windows-pre-$env:GITHUB_RUN_ID.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zip
          echo "ZIP=$zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: musify-windows-pre
          path: Musify-for-Windows-pre-*.zip

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          files: Musify-for-Windows-pre-*.zip
          generate_release_notes: true
          prerelease: true
          make_latest: false
          body: |
            **Windows Pre-Release Build**

            This is a pre-release build for testing purposes.
            May contain bugs or incomplete features.
